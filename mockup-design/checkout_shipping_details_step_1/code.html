<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout - Shipping Details</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#89726a",
                        "surface-container-highest": "#e4e2de",
                        "on-tertiary-fixed": "#1d1b19",
                        "surface-container-high": "#eae8e4",
                        "surface-container": "#f0eeea",
                        "on-tertiary-fixed-variant": "#484643",
                        "on-secondary": "#ffffff",
                        "tertiary": "#5e5c58",
                        "secondary-container": "#d4eca2",
                        "primary-container": "#bb5732",
                        "inverse-on-surface": "#f2f0ec",
                        "secondary-fixed": "#d4eca2",
                        "on-secondary-fixed": "#141f00",
                        "on-primary-fixed": "#380c00",
                        "surface-variant": "#e4e2de",
                        "primary": "#9b3f1c",
                        "outline-variant": "#ddc1b8",
                        "on-secondary-container": "#576b2f",
                        "secondary-fixed-dim": "#b8cf88",
                        "on-tertiary": "#ffffff",
                        "secondary": "#52652a",
                        "on-surface": "#1b1c1a",
                        "surface-tint": "#9e421e",
                        "error": "#ba1a1a",
                        "surface-bright": "#fbf9f5",
                        "on-tertiary-container": "#fffbff",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#cac6c1",
                        "surface-container-lowest": "#ffffff",
                        "background": "#fbf9f5",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#777470",
                        "on-background": "#1b1c1a",
                        "on-surface-variant": "#56423c",
                        "on-primary-container": "#fffbff",
                        "inverse-surface": "#30312e",
                        "primary-fixed": "#ffdbcf",
                        "surface-container-low": "#f5f3ef",
                        "primary-fixed-dim": "#ffb59c",
                        "surface-dim": "#dbdad6",
                        "on-secondary-fixed-variant": "#3b4d14",
                        "inverse-primary": "#ffb59c",
                        "surface": "#fbf9f5",
                        "on-primary-fixed-variant": "#7f2b07",
                        "tertiary-fixed": "#e6e2dd"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-24">
<!-- Top Navigation -->
<nav class="bg-[#FBF9F5]/80 dark:bg-[#1A1A1A]/80 backdrop-blur-md fixed top-0 w-full z-50 flex items-center justify-between px-6 py-4 w-full">
<button class="hover:opacity-70 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#9B3F1C] dark:text-[#D46A43]">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold tracking-tight uppercase text-lg font-extrabold tracking-tighter text-[#2D2B2A] dark:text-[#FBF9F5]">CHECKOUT</h1>
<button class="hover:opacity-70 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#9B3F1C] dark:text-[#D46A43]">shopping_bag</span>
</button>
</nav>
<!-- Main Content Area -->
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Progress Summary Bento Item -->
<header class="mb-10">
<div class="bg-surface-container-lowest p-6 rounded-xl mb-4 flex items-center justify-between shadow-[0_4px_20px_rgba(155,63,28,0.04)]">
<div>
<p class="text-primary font-bold text-xs tracking-widest uppercase mb-1">Step 01</p>
<h2 class="text-2xl font-bold text-on-surface">Shipping Details</h2>
</div>
<div class="w-12 h-12 rounded-full border-4 border-surface-container-high flex items-center justify-center relative">
<span class="text-xs font-bold text-primary">33%</span>
<svg class="absolute inset-0 -rotate-90" viewbox="0 0 36 36">
<circle class="stroke-primary" cx="18" cy="18" fill="none" r="16" stroke-dasharray="33, 100" stroke-linecap="round" stroke-width="4"></circle>
</svg>
</div>
</div>
<p class="text-on-surface-variant text-sm leading-relaxed">Please provide your delivery information to ensure your curated selection arrives safely at your doorstep.</p>
</header>
<!-- Form Section -->
<section class="space-y-8">
<!-- Asymmetric Layout: Full Name -->
<div class="group">
<label class="block text-xs font-bold uppercase tracking-widest text-primary mb-2 ml-1">Full Name</label>
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-colors py-4 px-1 text-on-surface placeholder:text-on-surface-variant/40 font-medium" placeholder="Cameron Williamson" type="text"/>
</div>
<!-- Asymmetric Layout: Street Address -->
<div class="group">
<label class="block text-xs font-bold uppercase tracking-widest text-primary mb-2 ml-1">Street Address</label>
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-colors py-4 px-1 text-on-surface placeholder:text-on-surface-variant/40 font-medium" placeholder="2464 Royal Ln. Mesa" type="text"/>
</div>
<!-- Grid Layout for City and Apartment -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="group">
<label class="block text-xs font-bold uppercase tracking-widest text-primary mb-2 ml-1">Apartment / Suite</label>
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-colors py-4 px-1 text-on-surface placeholder:text-on-surface-variant/40 font-medium" placeholder="Apt 4B" type="text"/>
</div>
<div class="group">
<label class="block text-xs font-bold uppercase tracking-widest text-primary mb-2 ml-1">City</label>
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-colors py-4 px-1 text-on-surface placeholder:text-on-surface-variant/40 font-medium" placeholder="New Jersey" type="text"/>
</div>
</div>
<!-- Grid Layout for Postal Code and Phone -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="group">
<label class="block text-xs font-bold uppercase tracking-widest text-primary mb-2 ml-1">Postal Code</label>
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-colors py-4 px-1 text-on-surface placeholder:text-on-surface-variant/40 font-medium" placeholder="45463" type="text"/>
</div>
<div class="group">
<label class="block text-xs font-bold uppercase tracking-widest text-primary mb-2 ml-1">Phone Number</label>
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-colors py-4 px-1 text-on-surface placeholder:text-on-surface-variant/40 font-medium" placeholder="(201) 555-0124" type="tel"/>
</div>
</div>
<!-- Tonal Shift Section for Delivery Preference -->
<div class="bg-surface-container-low p-6 rounded-xl mt-12">
<h3 class="text-sm font-bold uppercase tracking-widest text-on-surface mb-4">Delivery Speed</h3>
<div class="flex gap-4 overflow-x-auto no-scrollbar">
<label class="flex-shrink-0 cursor-pointer">
<input checked="" class="hidden peer" name="delivery" type="radio"/>
<div class="px-6 py-4 rounded-xl bg-surface-container-lowest border-2 border-transparent peer-checked:border-primary transition-all">
<span class="block font-bold text-on-surface">Standard</span>
<span class="text-xs text-on-surface-variant">5-7 Business Days</span>
<span class="block mt-2 text-primary font-bold">Free</span>
</div>
</label>
<label class="flex-shrink-0 cursor-pointer">
<input class="hidden peer" name="delivery" type="radio"/>
<div class="px-6 py-4 rounded-xl bg-surface-container-lowest border-2 border-transparent peer-checked:border-primary transition-all">
<span class="block font-bold text-on-surface">Express</span>
<span class="text-xs text-on-surface-variant">2-3 Business Days</span>
<span class="block mt-2 text-primary font-bold">$15.00</span>
</div>
</label>
</div>
</div>
<!-- Summary Card with Glassmorphism influence -->
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-[0_4px_40px_rgba(155,63,28,0.06)]">
<div class="flex justify-between items-center mb-6">
<span class="text-on-surface-variant">Order Total</span>
<span class="text-2xl font-bold text-on-surface">$245.00</span>
</div>
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-5 rounded-xl font-bold tracking-widest uppercase shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
                    Continue to Payment
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</section>
<!-- Decorative Spacer -->
<div class="h-12"></div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full h-20 bg-[#FBF9F5]/80 dark:bg-[#1A1A1A]/80 backdrop-blur-md flex justify-around items-center px-8 pb-safe rounded-t-[1.5rem] z-50 shadow-[0_-4px_40px_rgba(155,63,28,0.06)]">
<!-- Shipping Active -->
<div class="flex flex-col items-center justify-center bg-[#9B3F1C] text-white rounded-full px-5 py-2 transition-all active:scale-90 duration-300">
<span class="material-symbols-outlined text-[20px]" data-icon="local_shipping">local_shipping</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest">Shipping</span>
</div>
<!-- Payment Inactive -->
<div class="flex flex-col items-center justify-center text-[#2D2B2A]/40 dark:text-[#FBF9F5]/40 px-5 py-2 hover:text-[#9B3F1C] dark:hover:text-[#D46A43] active:scale-90 duration-300">
<span class="material-symbols-outlined text-[20px]" data-icon="qr_code_2">qr_code_2</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest">Payment</span>
</div>
<!-- Review Inactive -->
<div class="flex flex-col items-center justify-center text-[#2D2B2A]/40 dark:text-[#FBF9F5]/40 px-5 py-2 hover:text-[#9B3F1C] dark:hover:text-[#D46A43] active:scale-90 duration-300">
<span class="material-symbols-outlined text-[20px]" data-icon="fact_check">fact_check</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest">Review</span>
</div>
</nav>
</body></html>
